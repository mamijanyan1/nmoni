<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nmoni - Products</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        
        .description {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 30px;
        }
        
        .tech-stack {
            margin: 30px 0;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        
        .tech-stack h3 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .languages {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .language {
            background: white;
            padding: 10px 20px;
            border-radius: 5px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .language strong {
            color: #667eea;
        }
        
        .links {
            margin-top: 30px;
        }
        
        .links a {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border-radius: 5px;
            text-decoration: none;
            margin: 10px;
            transition: background 0.3s;
        }
        
        .links a:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 nmoni</h1>
        <p class="description">productsnew</p>
        
        <div class="tech-stack">
            <h3>Technology Stack</h3>
            <div class="languages">
                <div class="language"><strong>TypeScript</strong> 97.1%</div>
                <div class="language"><strong>JavaScript</strong> 2.8%</div>
                <div class="language"><strong>Other</strong> 0.1%</div>
            </div>
        </div>
        
        <div class="links">
            <a href="https://github.com/mamijanyan1/nmoni" target="_blank">View on GitHub</a>
        </div>
    </div>
</body>
</html>
